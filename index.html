<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-digital-postcard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>my&#8209;digital&#8209;postcard</h1>
      <p>shoot or upload a photo, pick a film, save it as a stamp</p>
    </header>

    <main>
      <section class="stage">
        <div class="viewport" id="viewport">
          <video id="feed" playsinline muted></video>
          <canvas id="gl"></canvas>
          <div class="bezel"></div>
          <div class="hint" id="hint">start the camera or drop a photo here</div>
        </div>

        <div class="films" id="films"></div>

        <div class="controls">
          <button id="btnCamera" class="btn">Camera</button>
          <label class="btn" for="file">Upload</label>
          <input id="file" type="file" accept="image/*" hidden />
          <button id="btnShutter" class="shutter" hidden aria-label="capture"></button>
          <button id="btnRetake" class="btn" hidden>Retake</button>
        </div>
      </section>

      <aside class="stampPanel" id="stampPanel" hidden>
        <div class="stampPreview" id="stampPreview"></div>
        <div class="fields">
          <label>Title<input id="title" value="POSTCARD" maxlength="18" /></label>
          <label>Number<input id="number" value="26" maxlength="4" /></label>
          <label>Caption<input id="caption" placeholder="film and place" maxlength="28" /></label>
          <label class="check"><input type="checkbox" id="dateToggle" checked />Date stamp</label>
          <label class="check"><input type="checkbox" id="halftoneToggle" />Halftone print</label>
          <button id="btnDownload" class="btn primary">Download stamp</button>
        </div>
      </aside>
    </main>

    <div id="err" class="err" hidden></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
