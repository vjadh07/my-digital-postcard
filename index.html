<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-digital-postcard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <span class="mark" aria-hidden="true"></span>
      <span class="word">my&#8209;digital&#8209;postcard</span>
      <span class="tag">shoot it. grade it. stamp it.</span>
    </header>

    <main class="workbench">
      <section class="cam">
        <div class="cam-top">
          <span class="cam-name">DIGI&#8209;POSTCARD</span>
          <span class="grille" aria-hidden="true"></span>
          <span class="cam-model">W&#8209;50</span>
        </div>

        <div class="screen" id="viewport">
          <div class="bars" aria-hidden="true"></div>
          <video id="feed" playsinline muted></video>
          <canvas id="gl"></canvas>
          <div class="hint" id="hint">press the button to shoot,<br />or drop a photo here</div>
          <div class="flash" id="flash" aria-hidden="true"></div>
        </div>

        <div class="readout"><span class="k">FILM</span><span id="readout">kodak warm</span></div>

        <div class="filmstrip" id="films" role="group" aria-label="film looks"></div>

        <div class="controls">
          <button id="btnCamera" class="btn">Camera</button>
          <label class="btn" for="file">Upload</label>
          <input id="file" type="file" accept="image/*" hidden />
          <button id="btnRetake" class="btn" hidden>Retake</button>
          <button id="btnShutter" class="shutter" hidden aria-label="capture photo">
            <span></span>
          </button>
        </div>
      </section>

      <aside class="output" id="stampPanel" hidden>
        <div class="stampPreview" id="stampPreview"></div>
        <form class="fields" onsubmit="return false">
          <label class="field"><span>Title</span><input id="title" value="POSTCARD" maxlength="18" /></label>
          <div class="row">
            <label class="field"><span>No.</span><input id="number" value="26" maxlength="4" /></label>
            <label class="field"><span>Caption</span><input id="caption" placeholder="film and place" maxlength="28" /></label>
          </div>
          <div class="checks">
            <label class="toggle"><input type="checkbox" id="dateToggle" checked /><span>Date stamp</span></label>
            <label class="toggle"><input type="checkbox" id="halftoneToggle" /><span>Halftone print</span></label>
          </div>
          <button id="btnDownload" class="btn primary">Download stamp</button>
        </form>
      </aside>
    </main>

    <div id="err" class="err" hidden></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
